<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Campaigns — BW & DF | 2026 Q3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF7;
  --bg-warm: #F5F3EE;
  --card: #FFFFFF;
  --border: #E8E4DE;
  --border-light: #F0EDE8;
  --shadow: rgba(0,0,0,0.04);
  --text: #2A2A2A;
  --text-secondary: #555555;
  --text-muted: #888888;
  --text-dim: #B0A99F;
  --accent-bw: #FF6921;
  --accent-bw-bg: #FFF6F0;
  --accent-bw-light: rgba(255,105,33,0.07);
  --accent-bw-dark: #E55A15;
  --accent-df: #22c55e;
  --accent-df-bg: #F2FAF5;
  --accent-df-light: rgba(34,197,94,0.07);
  --accent-df-dark: #16a34a;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  line-height:1.65; -webkit-font-smoothing:antialiased;
}

/* ═══ HEADER ═══ */
.header {
  padding:48px 40px 32px;
  max-width:1200px; margin:0 auto;
}
.header-top {
  display:flex; align-items:center; gap:12px; margin-bottom:8px;
}
.header-badge {
  padding:4px 10px; border-radius:6px; font-size:11px;
  font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
  background:var(--text); color:#fff;
}
.header h1 {
  font-size:28px; font-weight:800; letter-spacing:-0.5px;
}
.header-sub {
  font-size:14px; color:var(--text-muted); margin-top:4px;
}

/* ═══ STATS BAR ═══ */
.stats-bar {
  display:flex; gap:10px; flex-wrap:wrap;
  padding:0 40px; max-width:1200px; margin:0 auto 24px;
}
.stat {
  display:flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:8px;
  background:var(--bg-warm); border:1px solid var(--border-light);
  font-size:12px; color:var(--text-muted); font-weight:500;
}
.stat b { color:var(--text); font-size:13px; font-weight:700; }
.stat--bw b { color:var(--accent-bw); }
.stat--df b { color:var(--accent-df); }

/* ═══ TABS ═══ */
.tabs-wrap {
  padding:0 40px; max-width:1200px; margin:0 auto 28px;
  display:flex; gap:8px;
}
.tab-btn {
  padding:8px 20px; border-radius:10px; border:1px solid var(--border);
  background:var(--card); font-family:inherit; font-size:13px;
  font-weight:600; cursor:pointer; transition:all .2s;
  color:var(--text-secondary);
}
.tab-btn:hover { border-color:#ccc; }
.tab-btn.active--bw { background:var(--accent-bw); color:#fff; border-color:var(--accent-bw); }
.tab-btn.active--df { background:var(--accent-df); color:#fff; border-color:var(--accent-df); }
.tab-btn.active--all { background:var(--text); color:#fff; border-color:var(--text); }

/* ═══ BRAND SECTION ═══ */
.brand-section {
  max-width:1200px; margin:0 auto 48px;
  padding:0 40px;
}
.brand-header {
  display:flex; align-items:center; gap:12px;
  margin-bottom:24px; padding-bottom:16px;
  border-bottom:2px solid var(--border-light);
}
.brand-dot {
  width:12px; height:12px; border-radius:50%;
}
.brand-dot--bw { background:var(--accent-bw); }
.brand-dot--df { background:var(--accent-df); }
.brand-header h2 {
  font-size:18px; font-weight:700;
}
.brand-header .brand-count {
  font-size:12px; color:var(--text-muted); font-weight:500;
  padding:3px 10px; background:var(--bg-warm); border-radius:6px;
}

/* ═══ CAMPAIGN CARD ═══ */
.campaign {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; margin-bottom:20px;
  overflow:hidden; transition:box-shadow .2s;
}
.campaign:hover { box-shadow:0 8px 32px var(--shadow); }

.campaign-top {
  padding:24px 28px 20px;
  display:flex; align-items:flex-start; gap:16px;
}
.campaign-num {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; color:#fff; flex-shrink:0;
}
.campaign-num--bw { background:var(--accent-bw); }
.campaign-num--df { background:var(--accent-df); }

.campaign-info { flex:1; min-width:0; }
.campaign-channel {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.8px; margin-bottom:4px;
}
.campaign-channel--bw { color:var(--accent-bw); }
.campaign-channel--df { color:var(--accent-df); }

.campaign-title {
  font-size:17px; font-weight:700; margin-bottom:6px;
}
.campaign-desc {
  font-size:13px; color:var(--text-secondary); line-height:1.6;
}

.campaign-kpis {
  display:flex; gap:8px; flex-shrink:0; align-self:center;
}
.kpi-chip {
  padding:4px 10px; border-radius:6px; font-size:11px;
  font-weight:600; background:var(--bg-warm); color:var(--text-secondary);
  white-space:nowrap;
}

/* ═══ CAMPAIGN GRID: targeting + copy ═══ */
.campaign-grid {
  display:grid; grid-template-columns:1fr 1fr;
  border-top:1px solid var(--border-light);
}
.campaign-cell {
  padding:20px 28px;
}
.campaign-cell + .campaign-cell {
  border-left:1px solid var(--border-light);
}
.campaign-cell h4 {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.8px; color:var(--text-dim); margin-bottom:8px;
}
.campaign-cell p, .campaign-cell ul {
  font-size:13px; color:var(--text-secondary); line-height:1.7;
}
.campaign-cell ul { list-style:none; }
.campaign-cell ul li::before {
  content:'→ '; color:var(--text-dim); font-weight:600;
}
.cta-tag {
  display:inline-block; margin-top:8px;
  padding:4px 12px; border-radius:6px;
  font-size:12px; font-weight:600;
}
.cta-tag--bw { background:var(--accent-bw-bg); color:var(--accent-bw); }
.cta-tag--df { background:var(--accent-df-bg); color:var(--accent-df); }

/* ═══ IMAGE PROMPTS ═══ */
.prompts-section {
  border-top:1px solid var(--border-light);
  padding:20px 28px 24px;
  background:var(--bg-warm);
}
.prompts-section h4 {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.8px; color:var(--text-dim); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.prompts-section h4 .ai-badge {
  padding:2px 8px; border-radius:4px; font-size:10px;
  background:var(--text); color:#fff; letter-spacing:0;
  text-transform:none; font-weight:600;
}
.prompt-cards {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:12px;
}
.prompt-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px;
  cursor:pointer; transition:all .2s; position:relative;
}
.prompt-card:hover {
  border-color:#ccc; box-shadow:0 2px 12px var(--shadow);
}
.prompt-card.copied {
  border-color:var(--accent-df);
}
.prompt-format {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.6px; color:var(--text-dim); margin-bottom:6px;
  display:flex; align-items:center; justify-content:space-between;
}
.prompt-format .copy-hint {
  font-size:10px; font-weight:500; color:var(--text-dim);
  text-transform:none; letter-spacing:0; opacity:0;
  transition:opacity .2s;
}
.prompt-card:hover .copy-hint { opacity:1; }
.prompt-text {
  font-size:12px; color:var(--text-secondary); line-height:1.65;
  font-style:italic;
}
.prompt-ratio {
  display:inline-block; margin-top:6px;
  padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:600; font-style:normal;
  background:var(--bg-warm); color:var(--text-muted);
}
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  padding:10px 24px; border-radius:10px;
  background:var(--text); color:#fff; font-size:13px; font-weight:600;
  opacity:0; transition:all .3s ease; pointer-events:none; z-index:999;
}
.toast.visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══ FOOTER ═══ */
.footer {
  text-align:center; padding:32px 40px 48px;
  font-size:12px; color:var(--text-dim);
}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px) {
  .header, .stats-bar, .tabs-wrap, .brand-section { padding-left:20px; padding-right:20px; }
  .campaign-grid { grid-template-columns:1fr; }
  .campaign-cell + .campaign-cell { border-left:none; border-top:1px solid var(--border-light); }
  .campaign-top { flex-direction:column; }
  .prompt-cards { grid-template-columns:1fr; }
}

@media print {
  .tabs-wrap, .toast { display:none; }
  .campaign { break-inside:avoid; }
}
</style>
</head>

// ═══ RENDER ═══
function render(filter) {
  var filtered = filter ? CAMPAIGNS.filter(function(c){ return c.brand === filter; }) : CAMPAIGNS;
  var html = '';
  var brands = {};
  filtered.forEach(function(c) {
    if (!brands[c.brand]) brands[c.brand] = [];
    brands[c.brand].push(c);
  });

  Object.keys(brands).forEach(function(brand) {
    var label = brand === 'bw' ? 'BetterWorkplace' : 'DailyFruits';
    var count = brands[brand].length;
    html += '<div class="brand-section" data-brand="' + brand + '">';
    html += '<div class="brand-header"><div class="brand-dot brand-dot--' + brand + '"></div>';
    html += '<h2>' + label + '</h2>';
    html += '<span class="brand-count">' + count + ' kampani' + (count === 1 ? 'a' : count < 5 ? 'e' : 'i') + '</span>';
    html += '</div>';

    brands[brand].forEach(function(c) {
      html += '<div class="campaign">';
      // TOP
      html += '<div class="campaign-top">';
      html += '<div class="campaign-num campaign-num--' + c.brand + '">' + c.num + '</div>';
      html += '<div class="campaign-info">';
      html += '<div class="campaign-channel campaign-channel--' + c.brand + '">' + c.channel + '</div>';
      html += '<div class="campaign-title">' + c.title + '</div>';
      html += '<div class="campaign-desc">' + c.desc + '</div>';
      html += '</div>';
      html += '<div class="campaign-kpis">';
      c.kpis.forEach(function(k) { html += '<span class="kpi-chip">' + k + '</span>'; });
      html += '</div></div>';
      // GRID
      html += '<div class="campaign-grid">';
      // Targeting
      html += '<div class="campaign-cell"><h4>Targeting</h4><ul>';
      c.targeting.forEach(function(t) { html += '<li>' + t + '</li>'; });
      html += '</ul></div>';
      // Copy + CTA
      html += '<div class="campaign-cell"><h4>Copy Direction</h4>';
      html += '<p style="font-weight:600;margin-bottom:8px">"' + c.copy + '"</p>';
      html += '<p style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Formaty: ' + c.formats.join(', ') + '</p>';
      html += '<span class="cta-tag cta-tag--' + c.brand + '">CTA: ' + c.cta + '</span>';
      html += '</div></div>';
      // PROMPTS
      html += '<div class="prompts-section">';
      html += '<h4>Prompty do obrazów <span class="ai-badge">AI Gen</span></h4>';
      html += '<div class="prompt-cards">';
      c.prompts.forEach(function(p, i) {
        html += '<div class="prompt-card" onclick="copyPrompt(this, ' + CAMPAIGNS.indexOf(c) + ', ' + i + ')">';
        html += '<div class="prompt-format">' + p.format + ' <span class="copy-hint">kliknij → kopiuj</span></div>';
        html += '<div class="prompt-text">' + p.prompt + '</div>';
        html += '<span class="prompt-ratio">' + p.ratio + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
      html += '</div>'; // /campaign
    });

    html += '</div>'; // /brand-section
  });

  document.getElementById('content').innerHTML = html;
}

function copyPrompt(el, ci, pi) {
  var text = CAMPAIGNS[ci].prompts[pi].prompt;
  navigator.clipboard.writeText(text).then(function() {
    el.classList.add('copied');
    showToast('Prompt skopiowany');
    setTimeout(function(){ el.classList.remove('copied'); }, 1500);
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(function(){ t.classList.remove('visible'); }, 2500);
}

function showAll(btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.className = 'tab-btn'; });
  btn.classList.add('active--all');
  render(null);
}

function showBrand(brand, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.className = 'tab-btn'; });
  btn.classList.add('active--' + brand);
  render(brand);
}

// Init
render(null);
</script>
</body>
</html>
